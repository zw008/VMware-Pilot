# VMware Pilot Configuration
# Pilot itself requires no vCenter credentials — it delegates to companion skills.
# This config controls workflow behavior and custom template locations.
#
# Copy to ~/.vmware/pilot.yaml if you need to customize defaults.

# Workflow database location (default: ~/.vmware/workflows.db)
# database: ~/.vmware/workflows.db

# Custom workflow templates directory (default: ~/.vmware/workflows/)
# templates_dir: ~/.vmware/workflows/

# Policy rules location (managed by vmware-policy)
# policy_rules: ~/.vmware/rules.yaml

# Audit database (managed by vmware-policy, shared across all skills)
# audit_db: ~/.vmware/audit.db
