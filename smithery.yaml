startCommand:
  type: stdio
  # vmware-pilot reads no config file — it owns no vCenter connection and
  # delegates to companion skills. Read-only mode is the only switch, and it is
  # an environment variable.
  configSchema:
    type: object
    properties:
      read_only:
        type: boolean
        description: "Withhold all 9 orchestration write tools from the MCP registry (default: false)"
    required: []
  commandFunction: |
    (config) => ({
      command: "vmware-pilot",
      args: ["mcp"],
      env: config.read_only ? { VMWARE_PILOT_READ_ONLY: "true" } : {}
    })
